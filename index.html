<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSGO - Multiplayer FPS</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .ui-panel {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            min-width: 120px;
        }
        .ui-value {
            color: #00ff88;
            font-size: 16px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 2px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="nameScreen" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: #333; padding: 40px; border-radius: 10px; text-align: center;">
            <h2 style="color: white; margin-bottom: 20px;">Enter Your Name</h2>
            <input type="text" id="playerName" placeholder="Your name..." style="padding: 10px; font-size: 16px; margin-bottom: 20px; width: 200px;">
            <br>
            <button id="joinGame" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Join Game</button>
        </div>
    </div>

    <div id="gameContainer" style="display: none;">
        <div id="ui">
            <div class="ui-panel">
                Players: <span id="playerCount" class="ui-value">0</span>
            </div>
            <div class="ui-panel">
                You: <span id="yourName" class="ui-value">Player</span>
            </div>
        </div>
        <div id="crosshair"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
    </script>
    
    <!-- Make THREE global for compatibility -->
    <script type="module">
        import * as THREE from 'three';
        window.THREE = THREE;
    </script>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
